<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tragamonedas - Proyecto Simulación</title>
    <link rel="stylesheet" href="./css/tragamonedas.css">

        <nav class="navegacion-juegos">

                <div class="rodillo" id="r3"><img src="./assets/bluey.png" alt=""></div>

    <script src="./js/state.js"></script>
