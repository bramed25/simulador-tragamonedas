<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Encuentra las Diferencias</title>

    <link rel="stylesheet" href="css/diferencias.css">

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">

</head>

<body>

    <!-- TÍTULO -->
    <h1>🐶 Encuentra las Diferencias 🐶</h1>

    <!-- CONTADOR -->
    <div class="info">

        Diferencias encontradas:
        <strong id="contador">0</strong>/3

    </div>

    <!-- JUEGO -->
    <div class="juego">

    <img
        src=""
        id="imagenJuego"
        alt="Juego de diferencias"
    >

    <div class="diferencia" data-id="1"></div>

    <div class="diferencia" data-id="2"></div>

    <div class="diferencia" data-id="3"></div>

</div>

    <!-- BOTÓN -->
    <button id="btnReclamar">

    Reclamar +3 tiros 🎰

   </button>

    <!-- MENSAJE -->
    <div id="mensaje"></div>

    <!-- JS -->
    <script src="js/diferencias.js"></script>

</body>

</html>
