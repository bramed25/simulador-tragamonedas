<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Encuentra las Diferencias</title>

    <link rel="stylesheet" href="diferencias.css">
    <link rel="stylesheet" href="../../global.css">

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">

</head>

<body>

    <!-- TÍTULO -->
    <h1>🐶 Encuentra las Diferencias 🐶</h1>

    <!-- CONTADOR -->

        Diferencias encontradas:
        <strong id="contador">0</strong>/3

    </div>

    <!-- JUEGO -->
    <div class="juego">

        <img src="" id="imagenJuego" alt="Juego de diferencias">

        <div class="diferencia" data-id="2"></div>

        <div class="diferencia" data-id="3"></div>

    </div>

    <!-- BOTÓN -->
    <button id="btnReclamar" class="btn-cartoon" disabled>Reclamar 3 Tiros</button>
    <p id="mensaje"></p>
    <button class="btn-cartoon btn-azul" onclick="window.location.href='../../index.html'">
        ⬅️ Volver a la Tragamonedas
    </button>

    <!-- MENSAJE -->
    <div id="mensaje"></div>

    <!-- JS -->
    <script src="../../js/state.js"></script>
    <script src="./rompecabezas.js"></script>
    <script src="diferencias.js"></script>
